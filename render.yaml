services:
  - type: web
    name: deeplung-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 --workers 1 --threads 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
